# Docker Compose для production-деплоя (ТЗ §35). См. DEPLOY.md.
#
# Сервисы:
#   db        — PostgreSQL 16 (том pgdata; наружу порты не публикуются).
#   web       — FastAPI/Uvicorn за nginx: несколько воркеров, proxy-headers,
#               миграции в entrypoint. Авто-backup здесь ВЫКЛЮЧЕН (BACKUP_AUTO=false).
#   scheduler — тот же образ, единственный экземпляр авто-backup (BACKUP_AUTO=true),
#               чтобы при N воркерах web не создавалось N копий.
#   nginx     — reverse proxy + TLS-терминация (80/443); ACME-challenge для certbot.
#   certbot   — выпуск/автопродление сертификатов Let's Encrypt (webroot).
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rental}
      POSTGRES_USER: ${POSTGRES_USER:-rental}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rental}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Berlin}
      APP_ALLOWED_HOSTS: ${APP_ALLOWED_HOSTS:-}
      # "" — авто (Secure в production). Временно по HTTP (без TLS) ставьте false.
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-}
      PDF_ENGINE: ${PDF_ENGINE:-auto}
      DATABASE_NAME: ${POSTGRES_DB:-rental}
      DATABASE_USER: ${POSTGRES_USER:-rental}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      STORAGE_PATH: /data/storage
      # Ручной backup из UI пишет в /backups; авто-backup — в сервисе scheduler.
      BACKUP_AUTO: "false"
      BACKUP_PATH: /backups
      BACKUP_TIME: ${BACKUP_TIME:-03:00}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      RUN_MIGRATIONS: "true"
    command:
      - uvicorn
      - app.main:app
      - --host=0.0.0.0
      - --port=8000
      - --workers=${WEB_CONCURRENCY:-3}
      - --proxy-headers
      - --forwarded-allow-ips=*
    volumes:
      - storage:/data/storage
      # Резервные копии — в каталог хоста вне рабочих volume (ТЗ §36).
      - ${BACKUP_PATH:-./backups}:/backups
    expose:
      - "8000"

  scheduler:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_SECRET_KEY: ${APP_SECRET_KEY:?set APP_SECRET_KEY}
      APP_TIMEZONE: ${APP_TIMEZONE:-Europe/Berlin}
      DATABASE_NAME: ${POSTGRES_DB:-rental}
      DATABASE_USER: ${POSTGRES_USER:-rental}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      STORAGE_PATH: /data/storage
      BACKUP_AUTO: "true"
      BACKUP_PATH: /backups
      BACKUP_TIME: ${BACKUP_TIME:-03:00}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      # Миграции применяет web; здесь не дублируем (иначе гонка alembic).
      RUN_MIGRATIONS: "false"
    command: ["python", "-m", "app.backup.scheduler"]
    # Не веб-сервер — healthcheck образа (curl /healthz) здесь неприменим.
    healthcheck:
      disable: true
    volumes:
      - storage:/data/storage:ro
      - ${BACKUP_PATH:-./backups}:/backups

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # HTTP-конфиг по умолчанию; после выпуска сертификата переключите на
      # ./nginx/app-ssl.conf через переменную NGINX_CONF в .env (см. DEPLOY.md).
      - ${NGINX_CONF:-./nginx/app.conf}:/etc/nginx/conf.d/default.conf:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    # Периодический reload — подхватить обновлённый сертификат после certbot renew.
    command: >
      sh -c 'while :; do sleep 12h & wait $${!}; nginx -s reload; done &
             exec nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Первичный выпуск — разово: docker compose run --rm certbot certonly ... (DEPLOY.md).
    # Далее контейнер каждые 12ч пытается продлить сертификаты.
    entrypoint: >
      sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot;
             sleep 12h & wait $${!}; done'

volumes:
  pgdata:
  storage:
  certbot-conf:
  certbot-www:
