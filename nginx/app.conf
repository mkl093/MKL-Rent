server {
    listen 80;
    server_name _;

    server_tokens off;                 # не раскрывать версию Nginx
    client_max_body_size 12m;          # запас под загрузку фото (ТЗ §11: до 10 МБ)

    # Security-заголовки (ТЗ §41.2).
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy same-origin always;

    location /static/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS в production: терминируйте TLS здесь (listen 443 ssl; ssl_certificate ...)
# и добавьте Strict-Transport-Security. Для локальной сети см. scripts/make_cert.py.
