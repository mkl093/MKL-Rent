{% extends "base.html" %}
{% block content %}
<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-4">
  <h1 class="h3 m-0">Настройки компании</h1>
  <div class="d-flex flex-wrap gap-2">
    <a href="/users" class="btn btn-outline-secondary">Пользователи</a>
    <a href="/backup" class="btn btn-outline-secondary">Резервные копии</a>
    <a href="/audit" class="btn btn-outline-secondary">Журнал действий</a>
  </div>
</div>

<form method="post" action="/settings" class="card shadow-sm" enctype="multipart/form-data">
  <div class="card-body">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <div class="row g-3">
      <div class="col-12 col-md-6">
        <label class="form-label" for="company_name">Название компании</label>
        <input class="form-control" id="company_name" name="company_name" value="{{ company.company_name or '' }}">
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="website">Сайт</label>
        <input class="form-control" id="website" name="website" value="{{ company.website or '' }}">
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="phone">Телефон</label>
        <input class="form-control" id="phone" name="phone" value="{{ company.phone or '' }}">
      </div>
      <div class="col-12 col-md-6">
        <label class="form-label" for="email">Email</label>
        <input class="form-control" id="email" name="email" type="email" value="{{ company.email or '' }}">
      </div>
      <div class="col-12">
        <label class="form-label" for="address">Адрес</label>
        <textarea class="form-control" id="address" name="address" rows="2">{{ company.address or '' }}</textarea>
      </div>
      <div class="col-12">
        <label class="form-label" for="logo">Логотип (для сметы и packing-листа)</label>
        <div class="d-flex flex-wrap align-items-center gap-3">
          {% if company.logo_path %}
          <img src="/media/{{ company.logo_path }}" alt="Логотип" style="max-height:64px" class="border rounded bg-white p-1">
          {% else %}
          <span class="text-secondary small">Логотип не загружен</span>
          {% endif %}
          <input class="form-control" id="logo" name="logo" type="file" accept="image/png,image/jpeg,image/webp" style="max-width:24rem">
          {% if company.logo_path %}
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="remove_logo" name="remove_logo" value="1">
            <label class="form-check-label" for="remove_logo">Удалить текущий</label>
          </div>
          {% endif %}
        </div>
        <div class="form-text">PNG, JPG или WebP, до 10 МБ. PNG сохраняет прозрачность.</div>
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label" for="vat_id">VAT ID</label>
        <input class="form-control" id="vat_id" name="vat_id" value="{{ company.vat_id or '' }}">
      </div>
      <div class="col-12 col-md-4">
        <label class="form-label" for="tax_number">Налоговый номер</label>
        <input class="form-control" id="tax_number" name="tax_number" value="{{ company.tax_number or '' }}">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label" for="default_vat">Ставка VAT, %</label>
        <input class="form-control" id="default_vat" name="default_vat" inputmode="decimal"
               value="{{ company.default_vat }}">
      </div>
      <div class="col-6 col-md-2">
        <label class="form-label" for="timezone">Часовой пояс</label>
        <input class="form-control" id="timezone" name="timezone" value="{{ company.timezone }}">
      </div>
      <div class="col-12">
        <label class="form-label" for="bank_details">Банковские реквизиты</label>
        <textarea class="form-control" id="bank_details" name="bank_details" rows="3">{{ company.bank_details or '' }}</textarea>
      </div>
      <div class="col-12">
        <label class="form-label" for="pdf_footer">Текст внизу PDF</label>
        <textarea class="form-control" id="pdf_footer" name="pdf_footer" rows="2">{{ company.pdf_footer or '' }}</textarea>
      </div>
    </div>
  </div>
  <div class="card-footer text-end">
    <button type="submit" class="btn btn-primary">Сохранить</button>
  </div>
</form>
{% endblock %}
